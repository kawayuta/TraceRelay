interface:
  display_name: "TraceRelay: Continue Prior Work"
  short_description: "Resume earlier work on the same subject and reuse previous findings before searching again"
  default_prompt: "If the user wants to keep going on the same subject, reuse what was learned, or avoid starting from scratch, use continue_prior_work first, then plan_next_step or prepare_search_queries before generic search so prior memory and current gaps shape the next step."

dependencies:
